name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target device'
        required: true
        type: choice
        default: ufi001c
        options:
          - ufi001c
      repo_url:
        description: 'REPO URL'
        required: true
        default: 'https://github.com/openwrt/openwrt'
      repo_branch:
        description: 'REPO BRANCH'
        required: true
        default: 'v25.12.0'

env:
  REPO_URL: ${{ inputs.repo_url }}
  REPO_BRANCH: ${{ inputs.repo_branch }}
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E ./devenv/dependencies.sh
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone OpenWrt source code
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Load msm89xx target and packages
      run: |
        git apply --unsafe-paths enable_wcn36xx_mac80211.patch
        mv msm89xx openwrt/target/linux/msm89xx
        mv packages openwrt/package/ufi001c

    - name: Update and install feeds
      run: |
        cd openwrt
        rm -rf tmp
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load diffconfig
      run: |
        DEVICE="${{ inputs.device || 'ufi001c' }}"
        DIFFCONFIG=$([ "$DEVICE" = "ufi001c" ] && echo "diffconfig" || echo "diffconfig_${DEVICE}")
        [ -f "$DIFFCONFIG" ] && mv "$DIFFCONFIG" openwrt/.config

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \; || true
        find dl -size -1024c -exec rm -f {} \; || true
        
    - name: Restore cached 
      id: cache-openwrt-restore
      uses: actions/cache/restore@v4
      with:
        path: |
          openwrt/build_dir
          openwrt/staging_dir
          openwrt/tools
          openwrt/toolchain
          openwrt/tmp
        key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}
          
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage and check bin
      if: (!cancelled())
      run: |
        df -hT
        cd openwrt
        tree bin

    - name: Save cached 
      id: cache-openwrt-save
      uses: actions/cache/save@v4
      if: steps.cache-openwrt-restore.outputs.cache-hit != 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      with:
        path: |
          openwrt/build_dir
          openwrt/staging_dir
          openwrt/tools
          openwrt/toolchain
          openwrt/tmp
        key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        tar -czf targets_packages.tar.gz packages
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: openwrt_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: |
          ${{ env.FIRMWARE }}/openwrt-msm89xx-msm8916-${{ env.DEVICE_NAME }}-squashfs-gpt_both0.bin
          ${{ env.FIRMWARE }}/openwrt-msm89xx-msm8916-${{ env.DEVICE_NAME }}-squashfs-boot.img
          ${{ env.FIRMWARE }}/openwrt-msm89xx-msm8916-${{ env.DEVICE_NAME }}-squashfs-system.img
          ${{ env.FIRMWARE }}/openwrt-msm89xx-msm8916-${{ env.DEVICE_NAME }}.manifest
          ${{ env.FIRMWARE }}/openwrt-msm89xx-msm8916-${{ env.DEVICE_NAME }}-flash.sh
          ${{ env.FIRMWARE }}/openwrt-msm89xx-msm8916-${{ env.DEVICE_NAME }}-firmware.zip

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.compile.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      with:
        tag_name: echo "::set-output name=release_tag::$(date +"%Y.%m.%d-%H%M")"
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
